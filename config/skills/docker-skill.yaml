name: docker-skill
triggers:
  - docker
  - compose
  - container
rules:
  - Always use healthcheck for postgres service
  - Always add restart policy for redis
  - Use volume mounts for persistent data
  - Set resource limits for production containers
antiPatterns:
  - Using latest tag without version pinning
  - Exposing unnecessary ports
  - Running containers as root
examples:
  - input: "docker compose for postgres"
    output: "docker-compose.yml with healthcheck and volume"
